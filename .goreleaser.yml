version: 2

project_name: banana-four

before:
  hooks:
    - go mod tidy

builds:
  - id: banana-four
    main: .
    binary: banana-four
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    name_template: >-
      {{- .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Documentation
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"

release:
  draft: false
  prerelease: auto
  footer: |
    ---
    ## Install
    Download the appropriate archive for your platform, verify the SHA-256
    against `checksums.txt`, extract, and put `banana-four` on your `PATH`.

    ```sh
    brew install marcomondini/tap/banana-four
    ```

# Homebrew tap publishing. Requires:
#   1. A repo named `homebrew-tap` under the same owner.
#   2. A `HOMEBREW_TAP_TOKEN` secret with repo:write access to that tap.
# Comment out the entire `brews` block until both exist; otherwise the
# release will fail at the formula-publish step.
brews:
  - name: banana-four
    repository:
      owner: marcomondini
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/marcomondini/banana-four
    description: A pretty, interactive folder visualizer for the terminal.
    license: MIT
    test: |
      system "#{bin}/banana-four", "--version"
    install: |
      bin.install "banana-four"
