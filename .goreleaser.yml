version: 2

project_name: mira

before:
  hooks:
    - go mod tidy

builds:
  - id: mira
    main: .
    binary: mira
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    name_template: >-
      {{- .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Documentation
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"

release:
  draft: false
  prerelease: auto
  footer: |
    ---
    ## Install
    Download the appropriate archive for your platform, verify the SHA-256
    against `checksums.txt`, extract, and put `mira` on your `PATH`.

    See the README for installation options.

# --- Homebrew tap publishing -----------------------------------------------
# Publishes a formula to mondial7/homebrew-tap on every release, enabling
#
#     brew install mondial7/tap/mira
#
# Prerequisites (one-time setup, not part of this repo):
#   1. A public mondial7/homebrew-tap repo on GitHub.
#   2. A HOMEBREW_TAP_TOKEN repo secret on this repo, holding a PAT with
#      contents:write on the tap repo.
#
# skip_upload short-circuits when the token isn't set so a release still
# succeeds (forks, dry-runs, locally-triggered snapshots) — the formula
# is built but not pushed.
brews:
  - name: mira
    skip_upload: '{{ if eq .Env.HOMEBREW_TAP_TOKEN "" }}true{{ end }}'
    repository:
      owner: mondial7
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/mondial7/mira"
    description: A pretty, interactive folder visualizer for the terminal.
    license: MIT
    test: |
      system "#{bin}/mira", "--version"
    install: |
      bin.install "mira"
