# golangci-lint config — kept lean. Add linters as the codebase grows.
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: package-comments
      - name: exported

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
